apiVersion: v1
kind: Secret
metadata:
  name: insurex-api-secrets
  namespace: insurex
type: Opaque
stringData:
  ConnectionStrings__DefaultConnection: "REPLACE_WITH_PRODUCTION_CONNECTION_STRING"
  JwtSettings__SecretKey: "REPLACE_WITH_PRODUCTION_JWT_SECRET_KEY_MIN_32_CHARS"
  JwtSettings__Issuer: "InsureX"
  JwtSettings__Audience: "InsureXClient"
  JwtSettings__ExpirationHours: "24"
  EmailSettings__Password: "REPLACE_WITH_EMAIL_PASSWORD"
