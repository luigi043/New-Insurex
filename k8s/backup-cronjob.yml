apiVersion: batch/v1
kind: CronJob
metadata:
  name: insurex-db-backup
  namespace: insurex
  labels:
    app: insurex-api
    component: backup
spec:
  schedule: "0 2 * * *"  # Daily at 2 AM UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          containers:
            - name: backup
              image: mcr.microsoft.com/mssql-tools:latest
              command:
                - /bin/bash
                - -c
                - |
                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  BACKUP_FILE="/backups/insurex_${TIMESTAMP}.bak"
                  /opt/mssql-tools/bin/sqlcmd -S $DB_HOST -U $DB_USER -P $DB_PASSWORD \
                    -Q "BACKUP DATABASE [InsureX] TO DISK = N'${BACKUP_FILE}' WITH COMPRESSION, INIT, STATS = 10"
                  echo "Backup completed: ${BACKUP_FILE}"
                  # Cleanup backups older than 30 days
                  find /backups -name "insurex_*.bak" -mtime +30 -delete
              env:
                - name: DB_HOST
                  valueFrom:
                    secretKeyRef:
                      name: insurex-api-secrets
                      key: DB_HOST
                - name: DB_USER
                  valueFrom:
                    secretKeyRef:
                      name: insurex-api-secrets
                      key: DB_USER
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: insurex-api-secrets
                      key: DB_PASSWORD
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: insurex-backup-pvc
          restartPolicy: OnFailure
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: insurex-backup-pvc
  namespace: insurex
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: standard
