apiVersion: batch/v1
kind: Job
metadata:
  name: insurex-db-migration
  namespace: insurex
  labels:
    app: insurex-api
    component: migration
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      containers:
        - name: migration
          image: ghcr.io/insurex/insurex-api:latest
          command: ["dotnet", "InsureX.API.dll", "--migrate-only"]
          envFrom:
            - configMapRef:
                name: insurex-api-config
            - secretRef:
                name: insurex-api-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      restartPolicy: OnFailure
