name: Deploy Demo to GitHub Pages

on:
  push:
    branches:
      - main
      - blackboxai/github-pages-demo
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: insurex-react
        run: npm install --legacy-peer-deps

      - name: Build demo (GitHub Pages)
        working-directory: insurex-react
        run: npm run build:demo
        env:
          VITE_DEMO_MODE: 'true'
          VITE_APP_NAME: InsureX
          VITE_APP_ENV: demo

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: insurex-react/dist
          publish_branch: gh-pages
          commit_message: 'deploy: update GitHub Pages demo'
          force_orphan: true
