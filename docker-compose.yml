# docker-compose.yml
version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:80"
      - "5001:443"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=InsurexDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;
      - Jwt__Key=YourSuperSecretKeyHereMakeItLongAndSecure123!
      - Jwt__Issuer=InsurexApi
      - Jwt__Audience=InsurexClient
    depends_on:
      - sqlserver
    networks:
      - insurex-network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: insurex-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - insurex-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
    depends_on:
      - api
    networks:
      - insurex-network

volumes:
  sqlserver_data:

networks:
  insurex-network:
    driver: bridge