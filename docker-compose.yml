version: '3.9'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "InsureX_Dev@2026"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql

  api:
    build:
      context: .
      dockerfile: InsureX.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=db;Database=InsureXDb;User Id=sa;Password=InsureX_Dev@2026;TrustServerCertificate=True"
    ports:
      - "5000:80"
      - "5001:443"
    depends_on:
      - db

  iapr-api:
    build:
      context: .
      dockerfile: IAPR_API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=db;Database=InsureXDb;User Id=sa;Password=InsureX_Dev@2026;TrustServerCertificate=True"
    ports:
      - "5002:80"
    depends_on:
      - db

  web:
    build:
      context: ./insurex-react
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  sqldata:
